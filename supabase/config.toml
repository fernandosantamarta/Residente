project_id = "residente"

# create-checkout is called by signed-in residents from the Pay page —
# Supabase verifies their JWT before the function runs.
[functions.create-checkout]
verify_jwt = true

# create-setup-checkout / list-payment-methods / set-autopay are also called by
# signed-in residents (saved cards + autopay) — keep JWT verification on so RLS
# scopes each call to the caller's own roster row.
[functions.create-setup-checkout]
verify_jwt = true

[functions.list-payment-methods]
verify_jwt = true

[functions.set-autopay]
verify_jwt = true

# create-fine-checkout is called by a signed-in resident paying their own
# violation fine — keep JWT verification on so RLS scopes it to a fine they own.
[functions.create-fine-checkout]
verify_jwt = true

# refund-amenity is called by a signed-in resident cancelling their own paid
# booking (within the window) or by a board member overriding the window — keep
# JWT verification on so RLS scopes visibility to the caller before any refund.
[functions.refund-amenity]
verify_jwt = true

# connect-onboard is called by a signed-in board/admin to link the community's
# own Stripe account — keep JWT verification on; the function also re-checks the
# caller is a non-resident (or platform operator) before creating the account.
[functions.connect-onboard]
verify_jwt = true

# plaid-link-token / plaid-link-exchange are called by a signed-in board/admin to
# link the community's OWN bank (read-only). Keep JWT verification on; the function
# also re-checks the caller is a non-resident before minting/exchanging tokens.
[functions.plaid-link-token]
verify_jwt = true

[functions.plaid-link-exchange]
verify_jwt = true

# plaid-sync-transactions has two callers: a CRON_SECRET-gated scheduler (syncs all
# plaid-active communities) and a signed-in admin (own community). JWT verification
# MUST stay off so the cron path works; the function validates the user JWT itself
# in admin mode. Equivalent deploy flag: --no-verify-jwt
[functions.plaid-sync-transactions]
verify_jwt = false

# charge-autopay is the recurring-charge engine, called on a schedule (cron /
# scheduled function), not by a browser. JWT verification MUST stay off —
# authenticity is the CRON_SECRET header check inside the function.
[functions.charge-autopay]
verify_jwt = false

# charge-plan-installment charges due payment-plan installments for residents who
# opted into autopay. Same posture as charge-autopay: scheduled, CRON_SECRET-gated.
[functions.charge-plan-installment]
verify_jwt = false

# stripe-webhook is called by Stripe, which has no Supabase JWT. JWT
# verification MUST stay off — authenticity is the Stripe signature check
# inside the function. Equivalent deploy flag: --no-verify-jwt
[functions.stripe-webhook]
verify_jwt = false

# waitlist-notify is called by a Supabase Database Webhook on INSERT to
# public.waitlist, which has no Supabase JWT. JWT verification MUST stay
# off — authenticity is the WAITLIST_WEBHOOK_SECRET header check inside
# the function. Equivalent deploy flag: --no-verify-jwt
[functions.waitlist-notify]
verify_jwt = false

# arc-decision-letter is called by a signed-in board member / admin to render
# and deliver the ARC decision letter PDF to the owner. Keep JWT verification on
# so the caller is authenticated; the function also re-checks the caller is
# board/admin of the request's community before storing or notifying.
[functions.arc-decision-letter]
verify_jwt = true
