project_id = "residente"

# create-checkout is called by signed-in residents from the Pay page —
# Supabase verifies their JWT before the function runs.
[functions.create-checkout]
verify_jwt = true

# create-setup-checkout / list-payment-methods / set-autopay are also called by
# signed-in residents (saved cards + autopay) — keep JWT verification on so RLS
# scopes each call to the caller's own roster row.
[functions.create-setup-checkout]
verify_jwt = true

[functions.list-payment-methods]
verify_jwt = true

[functions.set-autopay]
verify_jwt = true

# create-fine-checkout is called by a signed-in resident paying their own
# violation fine — keep JWT verification on so RLS scopes it to a fine they own.
[functions.create-fine-checkout]
verify_jwt = true

# charge-autopay is the recurring-charge engine, called on a schedule (cron /
# scheduled function), not by a browser. JWT verification MUST stay off —
# authenticity is the CRON_SECRET header check inside the function.
[functions.charge-autopay]
verify_jwt = false

# stripe-webhook is called by Stripe, which has no Supabase JWT. JWT
# verification MUST stay off — authenticity is the Stripe signature check
# inside the function. Equivalent deploy flag: --no-verify-jwt
[functions.stripe-webhook]
verify_jwt = false

# waitlist-notify is called by a Supabase Database Webhook on INSERT to
# public.waitlist, which has no Supabase JWT. JWT verification MUST stay
# off — authenticity is the WAITLIST_WEBHOOK_SECRET header check inside
# the function. Equivalent deploy flag: --no-verify-jwt
[functions.waitlist-notify]
verify_jwt = false
